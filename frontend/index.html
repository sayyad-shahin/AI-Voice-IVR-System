<!DOCTYPE html>
<html>

<head>

<title>AI Conversation Translator</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<!-- WELCOME PAGE -->

<div id="welcomePage" class="welcomePage">

<div class="welcomeCard">

<h1>AI Conversation Translator</h1>

<p>Real-time multilingual voice assistant powered by AI</p>

<button id="startBtn">Get Started</button>

</div>

</div>


<!-- LOGIN PAGE -->

<div id="loginPage" class="loginPage">

<div class="login-box">

<h2>Welcome</h2>

<p>Login to continue</p>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button id="loginBtn">Login</button>

</div>

</div>


<!-- MAIN APPLICATION -->

<div id="appPage">

<header class="header">

<div class="logo">
AI Conversation Translator
</div>

<div class="status" id="status">
● Ready
</div>

</header>


<main class="main">

<div class="assistant">

<div class="orb"></div>

<p class="subtitle">
Real-time multilingual voice conversation
</p>

<div class="language-bar">

<label>Translate To:</label>

<select id="language">

<option value="1">English</option>
<option value="2">Hindi</option>
<option value="3">Marathi</option>
<option value="4">Tamil</option>
<option value="5">Telugu</option>
<option value="6">Gujarati</option>
<option value="7">Bengali</option>
<option value="8">Kannada</option>

</select>

</div>


<div class="chat" id="chat"></div>


<div class="controls">

<input
id="voiceBox"
placeholder="Tap here to start conversation"
/>

<div class="buttons-row">

<button class="btn friend1btn" id="friend1">
Friend 1 Speak
</button>

<button class="btn friend2btn" id="friend2">
Friend 2 Speak
</button>

</div>

</div>

</div>

</main>


<!-- LANGUAGE POPUP -->

<div id="langModal" class="modal">

<div class="modal-content">

<h3>Select Translation Language</h3>

<div class="lang-grid">

<button onclick="chooseLang(1)">1 English</button>
<button onclick="chooseLang(2)">2 Hindi</button>
<button onclick="chooseLang(3)">3 Marathi</button>
<button onclick="chooseLang(4)">4 Tamil</button>
<button onclick="chooseLang(5)">5 Telugu</button>
<button onclick="chooseLang(6)">6 Gujarati</button>
<button onclick="chooseLang(7)">7 Bengali</button>
<button onclick="chooseLang(8)">8 Kannada</button>

</div>

</div>

</div>

</div>


<script src="app.js"></script>

</body>
</html>
